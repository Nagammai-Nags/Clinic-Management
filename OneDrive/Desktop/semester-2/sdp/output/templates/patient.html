<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinic Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            font-family: 'Poppins', sans-serif;
        }

        .container {
            margin-top: 40px;
        }

        .title {
            color: white;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background-color: #4facfe;
            border: none;
        }

        .btn-primary:hover {
            background-color: #00c6ff;
        }

        th {
            background-color: #4facfe;
            color: white;
        }

        .search-box {
            border-radius: 10px;
            border: 2px solid #4facfe;
        }

        footer {
            margin-top: 30px;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- NAVIGATION BAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"> Clinic System</a>

        <div class="navbar-nav">
            <a class="nav-link active" href="/">Patient</a>
            <a class="nav-link" href="/doctor">Doctor</a>
            <a class="nav-link" href="/doctor/view">Appointment</a>
            <a class="nav-link" href="#">Billing</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="title">Patient Module</h2>

    <!-- Add Patient -->
    <div class="card p-4 mb-4">
        <h4>Add Patient</h4>
        <form action="/add" method="post">
            <div class="row">
                <div class="col-md-3">
                    <input type="number" name="id" class="form-control" placeholder="Patient ID" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="name" class="form-control" placeholder="Name" required>
                </div>
                <div class="col-md-2">
                    <input type="number" name="age" class="form-control" placeholder="Age" required>
                </div>
                <div class="col-md-4">
                    <input type="text" name="problem" class="form-control" placeholder="Problem" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Add Patient</button>
        </form>
    </div>

    <!-- View Button -->
    <a href="/view" class="btn btn-success mb-3">View Patients</a>

    <!-- Search -->
    <div class="card p-4 mb-4">
        <h4>Search Patient</h4>
        <input type="text" id="search" class="form-control search-box" placeholder="Enter name to search">
    </div>

    <!-- Patient List -->
    <div class="card p-4">
        <h4>Patient List</h4>
        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Problem</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                {% for p in patients %}
                <tr>
                    <td>{{ p[0] }}</td>
                    <td>{{ p[1] }}</td>
                    <td>{{ p[2] }}</td>
                    <td>{{ p[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <footer>
        <p> Clinic Management System © 2026</p>
    </footer>
</div>

<script>
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {
        let name = row.cells[1].innerText.toLowerCase();

        if (name.includes(value)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
});
</script>

</body>
</html>
